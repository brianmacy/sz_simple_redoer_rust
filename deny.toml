# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# This crate has no lapin / tcp-stream dependency, so it carries none of the
# lapin-specific RUSTSEC advisory ignores. Keep this list empty unless a real
# advisory affecting this crate's dependency tree appears.
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The Senzing Rust SDK is a public git dependency (pinned rev in Cargo.toml).
# It is not published to crates.io, so its git source must be explicitly allowed.
allow-git = ["https://github.com/brianmacy/sz-rust-sdk"]
